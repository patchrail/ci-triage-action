name: 'PatchRail CI Triage'
description: 'Explain a failed CI log locally and link the matching PatchRail /fix guide. Read-only, nothing leaves the runner.'
author: 'PatchRail'
branding:
  icon: 'activity'
  color: 'blue'

inputs:
  log-path:
    description: 'Path to the CI log file to explain. Leave empty to use log-text instead.'
    required: false
    default: ''
  log-text:
    description: 'Raw log text to explain when no log file is available.'
    required: false
    default: ''
  redact:
    description: 'Redact secrets, emails and home paths locally before classifying.'
    required: false
    default: 'true'
  patchrail-version:
    description: 'Pin an exact patchrail version from PyPI. Defaults to the range this action is tested against.'
    required: false
    default: ''
  python-version:
    description: 'Python version used to run the classifier.'
    required: false
    default: '3.x'

outputs:
  failure-class:
    description: 'The explained CI failure class (e.g. python-test-failure).'
    value: ${{ steps.triage.outputs.failure-class }}
  confidence:
    description: 'Explanation confidence between 0 and 1.'
    value: ${{ steps.triage.outputs.confidence }}
  guide-url:
    description: 'PatchRail /fix remediation guide URL for the failure class.'
    value: ${{ steps.triage.outputs.guide-url }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install PatchRail
      shell: bash
      run: |
        if [ -n "${{ inputs.patchrail-version }}" ]; then
          python -m pip install --quiet "patchrail==${{ inputs.patchrail-version }}"
        else
          # Bounded on purpose. patchrail ships breaking JSON contract changes in
          # minor bumps, so an unpinned install would put the next one straight
          # into every consumer's CI with no commit here to review it. The
          # `latest-patchrail` job in .github/workflows/test.yml runs this same
          # path against the newest release, so the range moves deliberately.
          python -m pip install --quiet "patchrail>=0.3.1,<0.5.0"
        fi

    - name: Explain failure and annotate
      id: triage
      shell: bash
      env:
        PATCHRAIL_LOG_PATH: ${{ inputs.log-path }}
        PATCHRAIL_LOG_TEXT: ${{ inputs.log-text }}
        PATCHRAIL_REDACT: ${{ inputs.redact }}
      run: |
        set -euo pipefail

        # A missing or empty log is a capture mistake, not a reason to add a
        # second red step to an already-failing run: annotate why and stop.
        annotate() { python "${GITHUB_ACTION_PATH}/scripts/annotate.py" "$@"; }

        # Resolve the log source: file path takes precedence, else inline text.
        LOG_FILE=""
        if [ -n "${PATCHRAIL_LOG_PATH}" ]; then
          if [ ! -f "${PATCHRAIL_LOG_PATH}" ]; then
            annotate --unclassified "log-path '${PATCHRAIL_LOG_PATH}' does not exist on the runner; the step that writes it may have died before creating it."
            exit 0
          fi
          LOG_FILE="${PATCHRAIL_LOG_PATH}"
        elif [ -n "${PATCHRAIL_LOG_TEXT}" ]; then
          LOG_FILE="$(mktemp)"
          printf '%s' "${PATCHRAIL_LOG_TEXT}" > "${LOG_FILE}"
        else
          echo "::error::patchrail-ci-triage: provide either log-path (an existing file) or log-text."
          exit 1
        fi

        REDACT_FLAG=""
        if [ "${PATCHRAIL_REDACT}" = "true" ]; then
          REDACT_FLAG="--redact"
        fi

        # `ci explain` exits non-zero on an empty log (the usual symptom of a
        # capture that dropped stderr). Keep its message, then annotate.
        ERR_FILE="$(mktemp)"
        if ! patchrail ci explain ${REDACT_FLAG} --log "${LOG_FILE}" --format json --out patchrail-ci-result.json 2>"${ERR_FILE}"; then
          cat "${ERR_FILE}" >&2
          annotate --unclassified "$(cat "${ERR_FILE}")"
          exit 0
        fi

        # Build the guide URL and emit the annotation + summary.
        annotate patchrail-ci-result.json
